      - name: Check out medifab (FluxCD manifests)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.MEDIFAB_REPO }}
          token: ${{ secrets.MEDIFAB_DEPLOY_TOKEN }}
          ref: main
          path: medifab

      - name: Update image tag in Flux overlay
        uses: mikefarah/yq@v4.47.1
        env:
          SHA: ${{ github.sha }}
        with:
          cmd: >-
            yq -i '(.images[] | select(.name == "${{ env.IMAGE }}") | .newTag) = strenv(SHA)'
            medifab/${{ env.MEDIFAB_OVERLAY }}/kustomization.yaml

      - name: Commit and push manifest update to medifab
        working-directory: medifab
        env:
          SOURCE_SHA: ${{ github.sha }}
          SOURCE_REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.MEDIFAB_OVERLAY }}/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "Image tag already at $SOURCE_SHA — nothing to commit."
            exit 0
          fi
          git commit -m "chore(cd): update thanh-long-market image to ${SOURCE_SHA} (from ${SOURCE_REPO})"
          git pull --rebase origin main
          git push
