# Builds the app image from this repo, pushes to Docker Hub, then commits the
# image tag update to SoltuneMontepre/medifab (FluxCD GitOps on k3s).
#
# Required GitHub secrets (org or repo):
#   DOPPLER_TOKEN          — Doppler service token (ci config: Docker Hub creds)
#   MEDIFAB_DEPLOY_TOKEN   — PAT or GitHub App token with contents:write on medifab
name: "thanh-long-market-cd"

permissions:
  contents: read

concurrency:
  group: thanh-long-market-cd
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - ".github/workflows/cd.yml"
  workflow_dispatch:

env:
  WORKING_DIRECTORY: app
  IMAGE: docker.io/soltunemontepre/thanh-long-market
  MEDIFAB_REPO: SoltuneMontepre/medifab
  MEDIFAB_OVERLAY: src/infra/clusters/environments/lims/apps/thanh-long

jobs:
  build-and-deploy:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Check out app repository
        uses: actions/checkout@v4

      - name: Fetch secrets from Doppler (ci — Docker Hub)
        uses: dopplerhq/secrets-fetch-action@v2.0.0
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}
          inject-env-vars: true
          doppler-config: ci
          doppler-project: medifab

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: useblacksmith/build-push-action@v2
        with:
          context: ${{ env.WORKING_DIRECTORY }}
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
