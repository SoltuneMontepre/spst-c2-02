services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: phiencho
      POSTGRES_PASSWORD: phiencho
      POSTGRES_DB: phiencho
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phiencho"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://phiencho:phiencho@db:5432/phiencho
      DIRECT_URL: postgresql://phiencho:phiencho@db:5432/phiencho
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      AUTH_GOOGLE_ID: ${AUTH_GOOGLE_ID:-}
      AUTH_GOOGLE_SECRET: ${AUTH_GOOGLE_SECRET:-}
      # Browser talks to the backend directly (same-site localhost → cookies flow).
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:4000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  # Standalone game backend: REST + Socket.IO + bots + phase timers (single writer).
  server:
    build:
      context: ..
      dockerfile: server/Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://phiencho:phiencho@db:5432/phiencho
      DIRECT_URL: postgresql://phiencho:phiencho@db:5432/phiencho
      REDIS_URL: redis://redis:6379
      AUTH_SECRET: ${AUTH_SECRET:-change-me-in-production}
      SERVER_PORT: "4000"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
